<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c5249" />
    <title>Ibrahim & Rasha Wedding</title>
    <style>
      :root {
        --cream: #e9d6c5;
        --paper: #fff0de;
        --paper-dark: #e5c1a6;
        --wine: #6d201a;
        --soft: #fff6ed;
        --shadow: rgba(38, 23, 17, 0.36);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 235, 221, 0.72), transparent 34%),
          linear-gradient(145deg, #92736a, #51433e);
        color: var(--soft);
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(8px, 2vw, 16px);
      }

      .phone {
        position: relative;
        width: min(calc(100vw - 32px), calc((100vh - 32px) * 0.8), 520px);
        aspect-ratio: 4 / 5;
        height: auto;
        overflow: hidden;
        border-radius: 8px;
        background: var(--cream);
        box-shadow: 0 28px 80px var(--shadow);
        isolation: isolate;
      }

      .phone::before,
      .phone::after {
        content: "";
        position: absolute;
        z-index: 1;
        width: 260px;
        height: 260px;
        background:
          radial-gradient(circle at 30% 30%, #d67083 0 16%, transparent 17%),
          radial-gradient(circle at 50% 36%, #871925 0 18%, transparent 19%),
          radial-gradient(circle at 68% 48%, #b24654 0 16%, transparent 17%),
          radial-gradient(circle at 42% 66%, #efb0a9 0 13%, transparent 14%);
        opacity: 0.86;
        pointer-events: none;
      }

      .phone::before {
        top: -124px;
        left: -118px;
        transform: rotate(-18deg);
      }

      .phone::after {
        right: -112px;
        bottom: -118px;
        transform: rotate(18deg);
      }

      .opening,
      .pages {
        position: absolute;
        inset: 0;
      }

      .opening {
        z-index: 8;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 45%, rgba(255, 249, 242, 0.58), transparent 36%),
          linear-gradient(180deg, #ead6c6, #d9bdaa);
      }

      .envelope-wrap {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        cursor: pointer;
        animation: float 2600ms ease-in-out infinite;
      }

      .envelope-wrap:focus {
        outline: 2px solid rgba(255, 246, 237, 0.92);
        outline-offset: 10px;
      }

      .envelope-image {
        width: 96%;
        height: auto;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 24px 36px rgba(42, 27, 21, 0.28));
      }

      .press {
        position: absolute;
        z-index: 9;
        left: 50%;
        bottom: 74px;
        width: max-content;
        max-width: 86%;
        margin: 0;
        color: var(--wine);
        font: 700 0.98rem Arial, sans-serif;
        letter-spacing: 0.14em;
        text-align: center;
        text-transform: uppercase;
        transform: translateX(-50%);
      }

      .coming-card {
        position: absolute;
        z-index: 6;
        left: 50%;
        bottom: 20%;
        width: min(58%, 250px);
        aspect-ratio: 4 / 5;
        border-radius: 4px;
        background: linear-gradient(180deg, #f8e7d7, #e4c1ab);
        box-shadow: 0 22px 36px rgba(42, 27, 21, 0.18);
        opacity: 0;
        transform: translate(-50%, 82px) scale(0.72);
      }

      .pages {
        z-index: 3;
        background: var(--cream);
      }

      .page {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 680ms ease;
        pointer-events: none;
      }

      .page.active {
        opacity: 1;
        pointer-events: auto;
      }

      .page img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background: var(--cream);
      }

      .nav-button,
      .rsvp-button,
      .calendar-buttons a {
        position: absolute;
        z-index: 6;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(109, 32, 26, 0.38);
        color: var(--wine);
        background: rgba(239, 219, 201, 0.84);
        box-shadow: 0 14px 26px rgba(42, 27, 21, 0.18);
        backdrop-filter: blur(8px);
        cursor: pointer;
        text-decoration: none;
      }

      .nav-button {
        bottom: 12px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 1.35rem;
        line-height: 1;
        background: rgba(239, 219, 201, 0.62);
        box-shadow: 0 8px 16px rgba(42, 27, 21, 0.12);
      }

      .back-button {
        left: 12px;
      }

      .next-button {
        right: 12px;
      }

      .rsvp-button {
        left: 50%;
        bottom: 41.7%;
        min-width: min(72%, 280px);
        min-height: 54px;
        padding: 12px 24px;
        border-radius: 999px;
        font: 700 1.2rem Arial, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        transform: translateX(-50%);
      }

      .calendar-buttons {
        position: absolute;
        z-index: 7;
        left: 50%;
        bottom: 8%;
        width: min(78%, 330px);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        transform: translateX(-50%);
      }

      .calendar-title {
        width: 100%;
        color: var(--wine);
        font: 700 0.74rem Arial, sans-serif;
        letter-spacing: 0.16em;
        text-align: center;
        text-transform: uppercase;
      }

      .calendar-buttons a {
        position: relative;
        min-width: 112px;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: 999px;
        font: 700 0.74rem Arial, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .sound-toggle {
        position: absolute;
        z-index: 20;
        right: 14px;
        top: 14px;
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(109, 32, 26, 0.24);
        border-radius: 50%;
        color: var(--wine);
        background: rgba(239, 219, 201, 0.74);
        box-shadow: 0 12px 24px rgba(42, 27, 21, 0.18);
        opacity: 0;
        pointer-events: none;
        cursor: pointer;
      }

      .sound-toggle svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      body.open .coming-card {
        animation: card-out 1500ms cubic-bezier(0.16, 0.86, 0.18, 1) 680ms forwards;
      }

      body.open .envelope-wrap {
        animation: envelope-away 1100ms ease 1500ms forwards;
      }

      body.open .opening {
        animation: opening-away 680ms ease 2250ms forwards;
      }

      body.open .sound-toggle {
        opacity: 1;
        pointer-events: auto;
      }

      body.revealed .page.active {
        opacity: 1;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes card-out {
        0% {
          opacity: 0;
          transform: translate(-50%, 82px) scale(0.72);
        }
        24% {
          opacity: 1;
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -215px) scale(1.08);
        }
      }

      @keyframes envelope-away {
        to {
          transform: translateY(220px) scale(0.62);
          opacity: 0;
        }
      }

      @keyframes opening-away {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      @media (max-width: 520px) {
        .app {
          padding: 8px;
        }

        .phone {
          width: min(calc(100vw - 16px), calc((100vh - 16px) * 0.8));
          height: auto;
          border-radius: 0;
        }

        .press {
          bottom: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="phone" aria-label="Ibrahim and Rasha wedding invitation">
        <div class="pages" aria-live="polite">
          <article class="page active" data-page="0">
            <img src="assets/page-1.jpg" alt="Ibrahim and Rasha wedding cover" />
            <button class="nav-button next-button" type="button" aria-label="Next page">›</button>
          </article>
          <article class="page" data-page="1">
            <img src="assets/page-2.jpg?v=20260602c" alt="Ibrahim and Rasha love story page" />
            <button class="nav-button back-button" type="button" aria-label="Previous page">‹</button>
            <button class="nav-button next-button" type="button" aria-label="Next page">›</button>
          </article>
          <article class="page" data-page="2">
            <img src="assets/page-3.jpg" alt="Ibrahim and Rasha wedding details page" />
            <button class="nav-button back-button" type="button" aria-label="Previous page">‹</button>
            <button class="nav-button next-button" type="button" aria-label="Next page">›</button>
          </article>
          <article class="page" data-page="3">
            <img src="assets/page-4.jpg" alt="Ibrahim and Rasha RSVP page" />
            <button class="nav-button back-button" type="button" aria-label="Previous page">‹</button>
            <a class="rsvp-button" href="https://forms.gle/GyE1Fwaj8KNGQNTRA" target="_blank" rel="noreferrer">RSVP</a>
            <div class="calendar-buttons" aria-label="Add wedding to calendar">
              <span class="calendar-title">Add to Calendar</span>
              <a href="assets/wedding.ics" download="Ibrahim-Rasha-Wedding.ics">iOS</a>
              <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Ibrahim%20%26%20Rasha%20Wedding&dates=20260626T163000Z/20260626T203000Z&details=Wedding%20celebration%20for%20Ibrahim%20and%20Rasha.%20Wedding%20starts%20at%207%3A30%20PM.&location=Holiday%20Inn%20Salmiya" target="_blank" rel="noreferrer">Android</a>
            </div>
          </article>
        </div>

        <div class="opening">
          <div class="coming-card" aria-hidden="true"></div>
          <div class="envelope-wrap" role="button" tabindex="0" aria-label="Open invitation">
            <img class="envelope-image" src="assets/envelope.png" alt="" />
          </div>
          <p class="press">Press to open</p>
        </div>

        <button class="sound-toggle" type="button" aria-label="Mute music" title="Mute music">
          <svg class="sound-on" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
            <path d="M16 9.5c1.2 1.4 1.2 3.6 0 5"></path>
            <path d="M18.5 7c2.4 2.8 2.4 7.2 0 10"></path>
          </svg>
          <svg class="sound-off" viewBox="0 0 24 24" aria-hidden="true" hidden>
            <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
            <path d="M18 9l4 4"></path>
            <path d="M22 9l-4 4"></path>
          </svg>
        </button>
      </section>
    </main>

    <audio id="weddingMusic" src="assets/perfect.mp3" preload="auto" loop></audio>
    <script>
      const music = document.querySelector("#weddingMusic");
      const opener = document.querySelector(".envelope-wrap");
      const pages = Array.from(document.querySelectorAll(".page"));
      const nextButtons = Array.from(document.querySelectorAll(".next-button"));
      const backButtons = Array.from(document.querySelectorAll(".back-button"));
      const navButtons = Array.from(document.querySelectorAll(".nav-button"));
      const soundToggle = document.querySelector(".sound-toggle");
      const soundOnIcon = document.querySelector(".sound-on");
      const soundOffIcon = document.querySelector(".sound-off");
      let opened = false;
      let pageIndex = 0;
      let fadeTimer;
      let pageTransitioning = false;

      const updateSoundButton = () => {
        const isOff = music.muted || music.paused;
        soundToggle.setAttribute("aria-label", isOff ? "Play music" : "Mute music");
        soundToggle.title = isOff ? "Play music" : "Mute music";
        soundOnIcon.hidden = isOff;
        soundOffIcon.hidden = !isOff;
      };

      const fadeMusicIn = () => {
        clearInterval(fadeTimer);
        music.volume = 0;
        fadeTimer = setInterval(() => {
          music.volume = Math.min(0.55, music.volume + 0.035);
          if (music.volume >= 0.55) clearInterval(fadeTimer);
        }, 120);
      };

      const showPage = (nextIndex) => {
        if (pageTransitioning || nextIndex === pageIndex) return;
        pageTransitioning = true;
        navButtons.forEach((button) => {
          button.disabled = true;
        });
        pages.forEach((page, index) => {
          page.classList.toggle("active", index === nextIndex);
        });
        pageIndex = nextIndex;
        setTimeout(() => {
          pageTransitioning = false;
          navButtons.forEach((button) => {
            button.disabled = false;
          });
        }, 700);
      };

      const openInvitation = () => {
        if (opened) return;
        opened = true;
        document.body.classList.add("open");
        music.play().then(fadeMusicIn).catch(updateSoundButton);
        setTimeout(() => {
          document.body.classList.add("revealed");
          pageTransitioning = false;
          showPage(0);
        }, 3400);
      };

      opener.addEventListener("click", openInvitation);
      opener.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openInvitation();
        }
      });

      nextButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (pageIndex < pages.length - 1) showPage(pageIndex + 1);
        });
      });

      backButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (pageIndex > 0) showPage(pageIndex - 1);
        });
      });

      soundToggle.addEventListener("click", () => {
        if (music.paused || music.muted) {
          music.muted = false;
          music.play().then(() => {
            if (music.volume === 0) fadeMusicIn();
            updateSoundButton();
          }).catch(updateSoundButton);
        } else {
          music.muted = true;
          updateSoundButton();
        }
      });

      music.addEventListener("play", updateSoundButton);
      music.addEventListener("pause", updateSoundButton);
    </script>
  </body>
</html>
