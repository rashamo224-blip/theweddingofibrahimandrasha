<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Ibrahim & Rasha Guest QR Passes</title>
    <style>
      :root {
        --ink: #862719;
        --rose: #c98164;
        --paper: #fff8ef;
        --line: #dcc5a7;
        --text: #4d3a32;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        background: #eee5da;
      }

      .login-screen {
        width: min(460px, calc(100% - 28px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 20px 0;
      }

      .login-card {
        width: 100%;
        display: grid;
        gap: 18px;
        padding: 28px;
        background:
          linear-gradient(rgba(255, 248, 239, 0.94), rgba(255, 248, 239, 0.94)),
          url("assets/ir-wedding.png") center / cover;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 34px rgba(70, 44, 31, 0.2);
      }

      .login-card h1 {
        font-size: clamp(2.4rem, 10vw, 4.6rem);
        line-height: 0.9;
      }

      .login-form,
      .field {
        display: grid;
        gap: 12px;
      }

      .field {
        gap: 7px;
      }

      label {
        color: #76645b;
        font: 700 0.74rem Arial, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      input {
        min-height: 44px;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        color: var(--text);
        background: #fffdf8;
        font: 700 0.85rem Arial, sans-serif;
      }

      .login-error {
        min-height: 1.4em;
        margin: 0;
        color: #a42b25;
        font: 700 0.85rem Arial, sans-serif;
      }

      body.locked .admin-content {
        display: none;
      }

      body:not(.locked) .login-screen {
        display: none;
      }

      header {
        padding: 28px 20px 18px;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 400;
      }

      .summary {
        margin: 10px 0 0;
        font-family: Arial, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #76645b;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        background: rgba(238, 229, 218, 0.92);
        backdrop-filter: blur(10px);
      }

      .toolbar a,
      .toolbar button {
        border: 1px solid rgba(134, 39, 25, 0.35);
        border-radius: 999px;
        padding: 10px 16px;
        color: var(--ink);
        background: var(--paper);
        text-decoration: none;
        font: 700 0.78rem Arial, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .passes {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      .pass {
        min-height: 420px;
        display: grid;
        align-content: space-between;
        justify-items: center;
        gap: 18px;
        padding: 24px;
        background:
          linear-gradient(rgba(255, 248, 239, 0.94), rgba(255, 248, 239, 0.94)),
          url("assets/ir-wedding.png") center / cover;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 16px 28px rgba(70, 44, 31, 0.14);
        text-align: center;
      }

      .names {
        display: grid;
        gap: 8px;
      }

      .kicker,
      .code,
      .seats {
        font-family: Arial, sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .kicker {
        color: #8d7467;
        font-size: 0.72rem;
      }

      .name {
        color: var(--ink);
        font-size: 1.55rem;
        line-height: 1.1;
      }

      .seats {
        color: var(--rose);
        font-size: 0.74rem;
      }

      .qr {
        width: 188px;
        height: 188px;
        display: grid;
        place-items: center;
        padding: 10px;
        background: #fffaf2;
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .qr svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .code {
        color: #7a5c4e;
        font-size: 0.68rem;
      }

      @media print {
        body {
          background: white;
        }

        header,
        .toolbar {
          display: none;
        }

        .passes {
          padding: 0;
          grid-template-columns: repeat(2, 1fr);
          gap: 0;
        }

        .pass {
          min-height: 50vh;
          border-radius: 0;
          box-shadow: none;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body class="locked">
    <section class="login-screen" aria-label="Admin login">
      <form class="login-card" id="loginForm">
        <div>
          <p class="summary">Ibrahim & Rasha</p>
          <h1>Admin Login</h1>
          <p>Sign in to view and print guest QR passes.</p>
        </div>
        <div class="login-form">
          <div class="field">
            <label for="adminUser">Username</label>
            <input id="adminUser" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="adminPass">Password</label>
            <input id="adminPass" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit">Login</button>
          <p class="login-error" id="loginError" aria-live="polite"></p>
        </div>
      </form>
    </section>

    <div class="admin-content">
      <header>
        <h1>Guest QR Passes</h1>
        <p class="summary" id="summary">Ibrahim & Rasha</p>
      </header>

      <nav class="toolbar" aria-label="QR pass actions">
        <button type="button" onclick="window.print()">Print Passes</button>
        <a href="checkin.html">Open Check-In</a>
        <button type="button" id="logout">Logout</button>
      </nav>

      <main class="passes" id="passes"></main>
    </div>

    <script src="assets/guests.js"></script>
    <script src="assets/qr.js"></script>
    <script>
      const passes = document.querySelector("#passes");
      const AUTH_KEY = "irWeddingAdminLoggedIn";
      const ADMIN_CREDENTIAL_HASH = "be228da01768c8c31fd5915cac44e50714785c3e1c9b7f95ddfe8eaca296ae2e";
      const loginForm = document.querySelector("#loginForm");
      const loginError = document.querySelector("#loginError");
      const adminUser = document.querySelector("#adminUser");
      const adminPass = document.querySelector("#adminPass");
      const hashCredentials = async (username, password) => {
        const bytes = new TextEncoder().encode(`${username.trim()}:${password}`);
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
      };
      const unlock = () => {
        document.body.classList.remove("locked");
      };
      const totalSeats = WEDDING_GUESTS.reduce((sum, guest) => sum + guest.seats, 0);
      document.querySelector("#summary").textContent =
        `${WEDDING_GUESTS.length} invitations · ${totalSeats} guests · Friends`;

      passes.innerHTML = WEDDING_GUESTS.map((guest) => `
        <article class="pass">
          <div class="names">
            <div class="kicker">Ibrahim & Rasha</div>
            <div class="name">${guest.name}</div>
            ${guest.seats > 1 ? `<div class="seats">${guest.seats - 1} guests attending with you</div>` : ""}
          </div>
          <div class="qr">${renderQrSvg(guest.id, 6)}</div>
          <div class="code">${guest.id}</div>
        </article>
      `).join("");

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const credentialHash = await hashCredentials(adminUser.value, adminPass.value);
        if (credentialHash === ADMIN_CREDENTIAL_HASH) {
          sessionStorage.setItem(AUTH_KEY, "true");
          loginError.textContent = "";
          adminPass.value = "";
          unlock();
        } else {
          loginError.textContent = "Incorrect username or password.";
          adminPass.value = "";
          adminPass.focus();
        }
      });

      document.querySelector("#logout").addEventListener("click", () => {
        sessionStorage.removeItem(AUTH_KEY);
        document.body.classList.add("locked");
        adminUser.focus();
      });

      if (sessionStorage.getItem(AUTH_KEY) === "true") {
        unlock();
      } else {
        adminUser.focus();
      }
    </script>
  </body>
</html>
